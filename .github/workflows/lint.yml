name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gdscript-lint:
    name: GDScript Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install gdtoolkit
        run: pip install "gdtoolkit==4.*"

      - name: Check formatting
        run: gdformat --check .

      - name: Lint
        run: gdlint .
