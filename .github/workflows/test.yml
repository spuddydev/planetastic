name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gut-tests:
    name: GUT Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: false
          include-templates: false

      - name: Import project
        run: godot --headless --import 2>&1 || true
        timeout-minutes: 2

      - name: Run GUT tests
        run: |
          godot --headless \
            -s res://addons/gut/gut_cmdln.gd \
            -gdir=res://tests \
            -ginclude_subdirs \
            -gexit \
            -glog=2
        timeout-minutes: 5
